name: Springboot_app

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build Application
        working-directory: spring-boot-app
        run: mvn clean package

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        working-directory: spring-boot-app
        run: docker build -t sireeshahub1802/spring:v1 .

      - name: Push Docker Image
        run: docker push sireeshahub1802/spring:v1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Configure EKS Access
        run: |
          aws eks update-kubeconfig --name spring --region us-east-1

      - name: Deploy to EKS
        run: |
          pwd
          cat deployment.yml
          sed -i "s|image: .*|image: sireeshahub1802/spring:v1|g" spring-boot-app-manifests/deployment.yml
          cat deployment.yml
          kubectl get nodes
          kubectl apply -f spring-boot-app-manifests/deployment.yml
          kubectl apply -f spring-boot-app-manifests/service.yml
          kubectl get pods -A
          kubectl get svc
